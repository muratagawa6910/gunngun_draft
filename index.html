<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gunngun</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-bottom: 20px;
}

.result {
  background: white;
  padding: 15px;
  border-radius: 10px;
  line-height: 1.8;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>【ガンナガン】抽選</h2>

<button onclick="draw()">スタート</button>

<div class="result" id="result">
結果がここに表示されます
</div>

<script>
// ===== カードリスト =====
const groupA = ["ヒバナ","ナトリ","ラン","キルコ","アマタ","マカ","ナナネ","テトラ","エコ","アハト","ウノ","ロック"];
const groupB = ["エンラ","カサネ","ドドメ","ヒカギリ","ロクロ","ミツメ"];
const groupC = ["ヌエ","ハクメン","キヨヒメ","ダイダラ","モウリョウ","カシャ"];
const groupD = ["ダタラ","ウワン","ツエツキ","バク","コダマ","ヒダル"];

// ===== 抽選関数 =====
function pickRandom(arr, num) {
  let shuffled = [...arr].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, num);
}

// ===== 実行 =====
function draw() {
  const A = pickRandom(groupA, 4);
  const B = pickRandom(groupB, 2);
  const C = pickRandom(groupC, 2);
  const D = pickRandom(groupD, 2);

  document.getElementById("result").innerHTML =
    "銃士 = " + A.join("、") + "<br>" +
    "ライト = " + B.join("、") + "<br>" +
    "ヘビー = " + C.join("、") + "<br>" +
    "スペシャル = " + D.join("、");
}
</script>

</body>
</html>
